spring:
  application:
    name: fleet-management-route-optimization

  datasource:
    # 🎯 AUTOMATIC DATABASE CREATION:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fleet_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    
    # 🔒 SECURE ENVIROMENT INJECTIONS:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 'update' automatically updates the schema by reflecting new entities/columns without deleting data
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# 📡 CONSOLE PORT PROFILE
server:
  port: 8081

# ==========================================
# External Third-Party Routing API Configurations
# ==========================================
app:
  external:
    map-service:
      base-url: "http://router.project-osrm.org"
      api-key: "${MAP_API_KEY:mock-local-developer-key}"
      timeout-ms: 5000